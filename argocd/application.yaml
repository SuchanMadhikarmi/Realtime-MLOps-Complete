apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: churn-model
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SuchanMadhikarmi/Realtime-MLOps-Project-copy
    targetRevision: cicd
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: churn-model
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
