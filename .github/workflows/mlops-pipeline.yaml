name: MLOps Pipeline

on:
  push:
    branches: [cicd]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  STORAGE_ACCOUNT: churnmlops2025
  CONTAINER_NAME: dvc-store

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Generate dataset
      run: python generate_data.py

    - name: Train model
      run: python train.py

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Push model to Azure Blob Storage
      run: |
        az storage blob upload \
          --account-name ${{ env.STORAGE_ACCOUNT }} \
          --container-name ${{ env.CONTAINER_NAME }} \
          --name models/churn_model.pkl \
          --file models/churn_model.pkl \
          --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
          --overwrite
        echo "Model pushed to Azure Blob Storage successfully"

    - name: Update inference.yaml with Azure model path
      run: |
        MODEL_URI="az://dvc-store/models/churn_model.pkl"
        sed -i "s|storageUri: .*|storageUri: $MODEL_URI|g" k8s/inference.yaml

    - name: Commit updated inference.yaml
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add k8s/inference.yaml
        git commit -m "Update model Azure Blob path [skip ci]" || echo "No changes"
        git push || echo "No changes to push"